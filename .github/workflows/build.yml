name: build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-multilib \
            grub-pc-bin \
            grub-common \
            xorriso \
            mtools \
            qemu-system-x86 \
            python3 \
            python3-pip \
            just

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pillow

      - name: Set TMPDIR (fix mtools issues)
        run: echo "TMPDIR=/tmp" >> $GITHUB_ENV

      - name: Build coffeeOS ISO
        run: just build-only
